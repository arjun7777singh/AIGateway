[project]
name = "detectors"
version = "0.0.1"
description = "Screening detectors (PII, secrets, prompt injection, ...)"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.9",
    "core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/detectors"]
